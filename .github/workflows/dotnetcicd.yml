name: .NET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet/v3-cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Publish Web API artifact
        run: |
          dotnet publish Dotnetproject.csproj --configuration Release --output ./publish --no-restore
          echo "artifact_path=publish" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api-publish
          path: publish

  sonar:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Sonar scanner
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet tool install --global dotnet-sonarscanner || true
          dotnet tool list --global

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore dependencies
        run: dotnet restore
      - name: SonarCloud - begin analysis (dotnet-sonarscanner)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -eux
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet tool install --global dotnet-sonarscanner || true
          dotnet tool list --global
          SONAR_HOST_URL=${SONAR_HOST_URL:-https://sonarcloud.io}
          echo "Using SONAR_HOST_URL=$SONAR_HOST_URL"
          # capture begin output to file for diagnostics
          mkdir -p sonar-logs
          dotnet-sonarscanner begin /k:"Saketkumar6203_dotnetHealthchecker" /n:"dotnethealthchecker" /o:"saketkumar6203" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.login="$SONAR_TOKEN" 2>&1 | tee sonar-logs/begin.log

      - name: Build project for Sonar analysis
        run: |
          mkdir -p sonar-logs
          dotnet build --configuration Release --no-restore 2>&1 | tee sonar-logs/build.log

      - name: SonarCloud - end analysis (dotnet-sonarscanner)
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -eux
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet tool list --global
          echo "Contents of .scannerwork (before end):"
          ls -la .scannerwork || true
          mkdir -p sonar-logs
          dotnet-sonarscanner end /d:sonar.login="$SONAR_TOKEN" 2>&1 | tee sonar-logs/end.log
          echo "Contents of .scannerwork (after end):"
          ls -la .scannerwork || true
          if [ -f .scannerwork/report-task.txt ]; then
            echo ".scannerwork/report-task.txt contents:"
            cat .scannerwork/report-task.txt | tee sonar-logs/report-task.txt
          fi
          echo "\n## Combined Sonar Output" > sonar-logs/one.md
          echo "\n### begin.log" >> sonar-logs/one.md
          cat sonar-logs/begin.log >> sonar-logs/one.md
          echo "\n### build.log" >> sonar-logs/one.md
          cat sonar-logs/build.log >> sonar-logs/one.md
          echo "\n### end.log" >> sonar-logs/one.md
          cat sonar-logs/end.log >> sonar-logs/one.md
          if [ -f sonar-logs/report-task.txt ]; then
            echo "\n### report-task.txt" >> sonar-logs/one.md
            cat sonar-logs/report-task.txt >> sonar-logs/one.md
          fi

      - name: Upload Sonar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-logs
          path: sonar-logs

  bug-detection:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Bug Detection Agent checks
        run: |
          echo "Running analyzer-based bug detection checks..."
          pwsh -NoProfile -Command "dotnet build --configuration Release --no-restore /p:RunAnalyzers=true /p:EnableNETAnalyzers=true /p:TreatWarningsAsErrors=true /warnaserror -p:NoWarn=NU1901 2>&1 | Tee-Object -FilePath bug-detection-output.txt; exit $LASTEXITCODE"

      - name: Generate bug-detection detailed report
        if: always()
        run: pwsh -NoProfile -File ./scripts/parse-bug-detection.ps1 -InputFile bug-detection-output.txt -Output artifacts/bug-detection.detailed.md

      - name: Upload bug-detection detailed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-detection-detailed
          path: artifacts/bug-detection.detailed.md

  code-quality-check:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Ensure dotnet-format is available
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          if ! command -v dotnet-format >/dev/null 2>&1; then
            dotnet tool install --tool-path "$HOME/.dotnet/tools" dotnet-format --version 5.1.250801
          fi
          dotnet-format --version

      - name: Verify code formatting
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet-format Dotnetproject.sln --check

  security-scan:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan dependencies for vulnerabilities
        run: |
          set -o pipefail
          echo "Scanning package vulnerabilities..."
          dotnet list package --vulnerable 2>&1 | tee security-scan-output.txt || true
          vulnerabilities=$(cat security-scan-output.txt || true)
          echo "$vulnerabilities"
          if echo "$vulnerabilities" | grep -E 'Severity: (High|Critical)' >/dev/null; then
            echo "High or critical vulnerabilities found. Failing the job."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."

      - name: Generate security-scan detailed report
        if: always()
        run: pwsh -NoProfile -File ./scripts/parse-security-scan.ps1 -InputFile security-scan-output.txt -Output artifacts/security-scan.detailed.md

      - name: Upload security-scan detailed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-detailed
          path: artifacts/security-scan.detailed.md

  test:
    needs: build
    if: always()
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: pwsh -NoProfile -Command "dotnet test .\Dotnetproject.Tests\Dotnetproject.Tests.csproj --configuration Release --verbosity normal --no-restore 2>&1 | Tee-Object -FilePath test-output.txt; exit $LASTEXITCODE"

      - name: Generate test detailed report
        if: always()
        run: pwsh -NoProfile -File ./scripts/parse-test.ps1 -InputFile test-output.txt -Output artifacts/test.detailed.md

      - name: Upload test detailed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-detailed
          path: artifacts/test.detailed.md

  docker:
    needs: [build, bug-detection, code-quality-check, security-scan, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/saketkumar6203/dotnethealthchecker:latest

  trivy-scan:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/saketkumar6203/dotnethealthchecker:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif

  security-alerts:
    needs: [sonar, security-scan, trivy-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download security-scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: security-scan-detailed
          path: security-artifacts
        continue-on-error: true

      - name: Download trivy-scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: trivy-scan-results
          path: security-artifacts
        continue-on-error: true

      - name: Generate unified security alerts report
        run: pwsh -NoProfile -File ./scripts/parse-security-alerts.ps1 -CodeQLOutput "security-artifacts/security-scan.detailed.md" -PackageVulnerabilities "security-artifacts/security-scan.detailed.md" -TrivyOutput "security-artifacts/trivy-results.sarif" -Output artifacts/security-alerts.detailed.md
        continue-on-error: true

      - name: Upload unified security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-alerts-report
          path: artifacts/security-alerts.detailed.md
        continue-on-error: true

      - name: Create GitHub issue for all security findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let reportContent = 'Security scan completed. Check artifacts for detailed report.';
            
            try {
              if (fs.existsSync('artifacts/security-alerts.detailed.md')) {
                reportContent = fs.readFileSync('artifacts/security-alerts.detailed.md', 'utf8');
              }
            } catch (e) {
              console.log('Could not read security report');
            }
            
            // Only create issue if there are actual findings
            if (reportContent.includes('Critical') || reportContent.includes('High') || reportContent.includes('error') || reportContent.includes('Vulnerabilities')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Unified Security Alert: Vulnerabilities Detected in Pipeline',
                body: `**Run:** [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})\n\n**Report Type:** Consolidated Security Scan\n\n## Summary\nSecurity scans (CodeQL, Package Vulnerability, Trivy) detected findings that require attention.\n\n## Detailed Report\nSee the artifact **security-alerts-report** for the full consolidated security report.\n\n## Next Steps\n1. Review the security report in the artifacts\n2. Address issues by severity (Critical → High → Medium → Low)\n3. Update dependencies and/or application code as needed\n4. Re-run pipeline to verify fixes\n\n---\n**For detailed findings, visit:**\n- [Code Scanning](${context.payload.repository.html_url}/security/code-scanning)\n- [Dependency Scanning](${context.payload.repository.html_url}/security/dependabot)\n- [Security Overview](${context.payload.repository.html_url}/security)\n\n**Labels:** security | alerts | unified-scan`,
                labels: ['security', 'alerts', 'unified-scan']
              });
            }

  deploy:
    needs: [docker, trivy-scan, security-alerts]
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request' }}

    steps:
      - name: Check kubeconfig secret
        id: kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "kubeconfig_available=false" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG_DATA secret is not configured. Skipping deployment."
          else
            echo "kubeconfig_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        uses: actions/checkout@v4

      - name: Set up kubectl
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -eux
          mkdir -p ~/.kube
          KUBECONFIG_FILE="$HOME/.kube/config"

          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "ERROR: KUBE_CONFIG_DATA secret is empty. Set a valid kubeconfig secret before deploying."
            exit 1
          fi

          printf '%s' "$KUBE_CONFIG_DATA" > /tmp/kubeconfig.yaml
          cp /tmp/kubeconfig.yaml "$KUBECONFIG_FILE"
          chmod 600 "$KUBECONFIG_FILE"

          echo "--- kubeconfig preview ---"
          head -n 20 "$KUBECONFIG_FILE"
          kubectl config view --kubeconfig "$KUBECONFIG_FILE"
          echo "--- clusters ---"
          kubectl config get-clusters --kubeconfig "$KUBECONFIG_FILE" || true
          echo "--- contexts ---"
          kubectl config get-contexts -o name --kubeconfig "$KUBECONFIG_FILE" || true
          echo "--- users ---"
          kubectl config get-users --kubeconfig "$KUBECONFIG_FILE" || true

          if ! kubectl config get-contexts -o name --kubeconfig "$KUBECONFIG_FILE" | grep -q .; then
            echo "ERROR: The kubeconfig contains no contexts. Ensure the secret holds a full kubeconfig with contexts."
            exit 1
          fi
          if ! kubectl config get-clusters --kubeconfig "$KUBECONFIG_FILE" | grep -q .; then
            echo "ERROR: The kubeconfig contains no clusters. Ensure the secret holds a valid kubeconfig with cluster definitions."
            exit 1
          fi

          kubectl config current-context --kubeconfig "$KUBECONFIG_FILE"
          kubectl get namespaces --kubeconfig "$KUBECONFIG_FILE"

      - name: Deploy to Kubernetes
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        run: |
          set -eux
          kubectl --kubeconfig ~/.kube/config apply -f k8s-deployment.yaml
          kubectl --kubeconfig ~/.kube/config rollout status deployment/dotnetproject-deployment -n dotnetproject-ns --timeout=120s

  pipeline-failure-notification:
    runs-on: ubuntu-latest
    if: failure()
    needs: [build, sonar, bug-detection, code-quality-check, security-scan, test, docker, trivy-scan, security-alerts, deploy]
    steps:
      - name: Determine failed jobs
        id: failed_jobs
        run: |
          # Collect info about which jobs failed
          echo "Analyzing pipeline failure..."
          
      - name: Create GitHub issue for pipeline failure
        uses: actions/github-script@v7
        with:
          script: |
            const jobName = context.job;
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Pipeline Failure: CI/CD workflow failed',
              body: `**Run:** [${context.runId}](${runUrl})\n\n**Workflow:** ${context.workflow}\n\n**Branch:** ${context.ref}\n\n**Commit:** ${context.sha}\n\n**Status:** Pipeline execution failed\n\nPlease review the [workflow logs](${runUrl}) to identify and fix the issues.`,
              labels: ['pipeline', 'failure']
            });
