name: .NET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet/v3-cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Publish Web API artifact
        run: |
          dotnet publish Dotnetproject.csproj --configuration Release --output ./publish --no-restore
          echo "artifact_path=publish" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api-publish
          path: publish

  bug-detection:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Bug Detection Agent checks
        run: |
          echo "Running analyzer-based bug detection checks..."
          dotnet build --configuration Release --no-restore /p:RunAnalyzers=true /p:EnableNETAnalyzers=true /p:TreatWarningsAsErrors=true /warnaserror

  code-quality-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Ensure dotnet-format is available
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          if ! command -v dotnet-format >/dev/null 2>&1; then
            dotnet tool install --tool-path "$HOME/.dotnet/tools" dotnet-format --version 5.1.250801
          fi
          dotnet-format --version

      - name: Verify code formatting
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet-format Dotnetproject.sln --check

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan dependencies for vulnerabilities
        run: |
          set -o pipefail
          echo "Scanning package vulnerabilities..."
          vulnerabilities=$(dotnet list package --vulnerable 2>&1 || true)
          echo "$vulnerabilities"
          if echo "$vulnerabilities" | grep -E 'Severity: (High|Critical)' >/dev/null; then
            echo "High or critical vulnerabilities found. Failing the job."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."

  test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: dotnet test --configuration Release --verbosity normal

  docker:
    needs: [build, bug-detection, code-quality-check, security-scan, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/saketkumar6203/dotnethealthchecker:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -eux
          mkdir -p ~/.kube
          KUBECONFIG_FILE="$HOME/.kube/config"

          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "ERROR: KUBE_CONFIG_DATA secret is empty. Set a valid kubeconfig secret before deploying."
            exit 1
          fi

          python - <<'PY'
import base64
import os
import pathlib
import sys

raw = os.environ.get("KUBE_CONFIG_DATA", "")
if not raw:
    print("KUBE_CONFIG_DATA is empty.")
    sys.exit(1)

path = pathlib.Path("/tmp/kubeconfig.data")
path.write_text(raw, encoding="utf-8")

try:
    decoded = base64.b64decode(raw.encode("utf-8"), validate=True).decode("utf-8")
except Exception:
    decoded = None

if decoded and ("kind: Config" in decoded or "apiVersion:" in decoded):
    pathlib.Path("/tmp/kubeconfig.yaml").write_text(decoded, encoding="utf-8")
    print("Decoded base64 kubeconfig successfully.")
else:
    pathlib.Path("/tmp/kubeconfig.yaml").write_text(raw, encoding="utf-8")
    print("Treating secret as raw kubeconfig content.")
PY

          cp /tmp/kubeconfig.yaml "$KUBECONFIG_FILE"
          chmod 600 "$KUBECONFIG_FILE"

          echo "--- kubeconfig preview ---"
          head -n 20 "$KUBECONFIG_FILE"
          kubectl config view --kubeconfig "$KUBECONFIG_FILE"
          echo "--- clusters ---"
          kubectl config get-clusters --kubeconfig "$KUBECONFIG_FILE" || true
          echo "--- contexts ---"
          kubectl config get-contexts -o name --kubeconfig "$KUBECONFIG_FILE" || true
          echo "--- users ---"
          kubectl config get-users --kubeconfig "$KUBECONFIG_FILE" || true

          if ! kubectl config get-contexts -o name --kubeconfig "$KUBECONFIG_FILE" | grep -q .; then
            echo "ERROR: The kubeconfig contains no contexts. Ensure the secret holds a full kubeconfig with contexts."
            exit 1
          fi
          if ! kubectl config get-clusters --kubeconfig "$KUBECONFIG_FILE" | grep -q .; then
            echo "ERROR: The kubeconfig contains no clusters. Ensure the secret holds a valid kubeconfig with cluster definitions."
            exit 1
          fi

          kubectl config current-context --kubeconfig "$KUBECONFIG_FILE"
          kubectl get namespaces --kubeconfig "$KUBECONFIG_FILE"

      - name: Deploy to Kubernetes
        run: |
          set -eux
          kubectl --kubeconfig ~/.kube/config apply -f k8s-deployment.yaml
          kubectl --kubeconfig ~/.kube/config rollout status deployment/dotnetproject-deployment -n dotnetproject-ns --timeout=120s
