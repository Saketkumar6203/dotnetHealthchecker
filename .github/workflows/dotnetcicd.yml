name: .NET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet/v3-cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Publish Web API artifact
        run: |
          dotnet publish Dotnetproject.csproj --configuration Release --output ./publish --no-restore
          echo "artifact_path=publish" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api-publish
          path: publish

  sonar:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Sonar scanner
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet tool install --global dotnet-sonarscanner || true
          dotnet tool list --global

      - name: Restore dependencies
        run: dotnet restore

      - name: Run SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_PROJECT_NAME: ${{ secrets.SONAR_PROJECT_NAME }}
        run: |
          set -eux
          export PATH="$HOME/.dotnet/tools:$PATH"
          echo "PATH=$PATH"
          which dotnet-sonarscanner || true
          dotnet-sonarscanner --version || true
          pwd
          ls -la
          SONAR_HOST_URL=${SONAR_HOST_URL:-https://sonarcloud.io}
          SONAR_PROJECT_KEY=${SONAR_PROJECT_KEY:-saketkumar6203_dotnethealthchecker}
          SONAR_PROJECT_NAME=${SONAR_PROJECT_NAME:-dotnethealthchecker}
          echo "Running: dotnet-sonarscanner begin /k:\"$SONAR_PROJECT_KEY\" /n:\"$SONAR_PROJECT_NAME\" /d:sonar.host.url=\"$SONAR_HOST_URL\" /d:sonar.login=\"[REDACTED]\""
          dotnet-sonarscanner begin /k:"$SONAR_PROJECT_KEY" /n:"$SONAR_PROJECT_NAME" /d:sonar.host.url="$SONAR_HOST_URL" /d:sonar.login="$SONAR_TOKEN"
          dotnet build --configuration Release --no-restore
          dotnet-sonarscanner end /d:sonar.login="$SONAR_TOKEN"

      - name: Wait for SonarCloud Quality Gate
        if: success()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -eux
          SONAR_HOST_URL=${SONAR_HOST_URL:-https://sonarcloud.io}
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is not set. Configure the SONAR_TOKEN secret in repository settings."
            exit 1
          fi
          if [ ! -f .scannerwork/report-task.txt ]; then
            echo ".scannerwork/report-task.txt not found. Cannot determine CE task id."
            ls -la .scannerwork || true
            exit 1
          fi
          CE_TASK_ID=$(grep '^ceTaskId=' .scannerwork/report-task.txt | cut -d= -f2)
          if [ -z "$CE_TASK_ID" ]; then
            echo "ceTaskId not found in report-task.txt"
            cat .scannerwork/report-task.txt
            exit 1
          fi
          echo "CE task id: $CE_TASK_ID"
          analysisId=""
          for i in $(seq 1 60); do
            sleep 5
            resp=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${CE_TASK_ID}")
            status=$(echo "$resp" | jq -r .task.status)
            echo "CE status: $status"
            if [ "$status" = "SUCCESS" ]; then
              analysisId=$(echo "$resp" | jq -r .task.analysisId)
              break
            fi
            if [ "$status" = "FAILED" ] || [ "$status" = "CANCELED" ]; then
              echo "CE task failed: $resp"
              exit 1
            fi
          done
          if [ -z "$analysisId" ]; then
            echo "Timed out waiting for CE task to complete"
            exit 1
          fi
          echo "analysisId: $analysisId"
          qgResp=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${analysisId}")
          qgStatus=$(echo "$qgResp" | jq -r .projectStatus.status)
          echo "Quality Gate status: $qgStatus"
          if [ "$qgStatus" != "OK" ]; then
            echo "Quality Gate failed"
            echo "$qgResp"
            exit 1
          fi
          echo "Quality Gate passed"

  bug-detection:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Bug Detection Agent checks
        run: |
          echo "Running analyzer-based bug detection checks..."
          pwsh -NoProfile -Command "dotnet build --configuration Release --no-restore /p:RunAnalyzers=true /p:EnableNETAnalyzers=true /p:TreatWarningsAsErrors=true /warnaserror -p:NoWarn=NU1901 2>&1 | Tee-Object -FilePath bug-detection-output.txt; exit $LASTEXITCODE"

      - name: Generate bug-detection detailed report
        if: always()
        run: pwsh -NoProfile -File ./scripts/parse-bug-detection.ps1 -InputFile bug-detection-output.txt -Output artifacts/bug-detection.detailed.md

      - name: Upload bug-detection detailed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-detection-detailed
          path: artifacts/bug-detection.detailed.md

  code-quality-check:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Ensure dotnet-format is available
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          if ! command -v dotnet-format >/dev/null 2>&1; then
            dotnet tool install --tool-path "$HOME/.dotnet/tools" dotnet-format --version 5.1.250801
          fi
          dotnet-format --version

      - name: Verify code formatting
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet-format Dotnetproject.sln --check

  security-scan:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan dependencies for vulnerabilities
        run: |
          set -o pipefail
          echo "Scanning package vulnerabilities..."
          dotnet list package --vulnerable 2>&1 | tee security-scan-output.txt || true
          vulnerabilities=$(cat security-scan-output.txt || true)
          echo "$vulnerabilities"
          if echo "$vulnerabilities" | grep -E 'Severity: (High|Critical)' >/dev/null; then
            echo "High or critical vulnerabilities found. Failing the job."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."

      - name: Generate security-scan detailed report
        if: always()
        run: pwsh -NoProfile -File ./scripts/parse-security-scan.ps1 -InputFile security-scan-output.txt -Output artifacts/security-scan.detailed.md

      - name: Upload security-scan detailed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-detailed
          path: artifacts/security-scan.detailed.md

  test:
    needs: build
    if: always()
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: pwsh -NoProfile -Command "dotnet test .\Dotnetproject.Tests\Dotnetproject.Tests.csproj --configuration Release --verbosity normal --no-restore 2>&1 | Tee-Object -FilePath test-output.txt; exit $LASTEXITCODE"

      - name: Generate test detailed report
        if: always()
        run: pwsh -NoProfile -File ./scripts/parse-test.ps1 -InputFile test-output.txt -Output artifacts/test.detailed.md

      - name: Upload test detailed report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-detailed
          path: artifacts/test.detailed.md

  docker:
    needs: [build, bug-detection, code-quality-check, security-scan, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/saketkumar6203/dotnethealthchecker:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request' }}

    steps:
      - name: Check kubeconfig secret
        id: kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "kubeconfig_available=false" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG_DATA secret is not configured. Skipping deployment."
          else
            echo "kubeconfig_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        uses: actions/checkout@v4

      - name: Set up kubectl
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -eux
          mkdir -p ~/.kube
          KUBECONFIG_FILE="$HOME/.kube/config"

          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "ERROR: KUBE_CONFIG_DATA secret is empty. Set a valid kubeconfig secret before deploying."
            exit 1
          fi

          printf '%s' "$KUBE_CONFIG_DATA" > /tmp/kubeconfig.yaml
          cp /tmp/kubeconfig.yaml "$KUBECONFIG_FILE"
          chmod 600 "$KUBECONFIG_FILE"

          echo "--- kubeconfig preview ---"
          head -n 20 "$KUBECONFIG_FILE"
          kubectl config view --kubeconfig "$KUBECONFIG_FILE"
          echo "--- clusters ---"
          kubectl config get-clusters --kubeconfig "$KUBECONFIG_FILE" || true
          echo "--- contexts ---"
          kubectl config get-contexts -o name --kubeconfig "$KUBECONFIG_FILE" || true
          echo "--- users ---"
          kubectl config get-users --kubeconfig "$KUBECONFIG_FILE" || true

          if ! kubectl config get-contexts -o name --kubeconfig "$KUBECONFIG_FILE" | grep -q .; then
            echo "ERROR: The kubeconfig contains no contexts. Ensure the secret holds a full kubeconfig with contexts."
            exit 1
          fi
          if ! kubectl config get-clusters --kubeconfig "$KUBECONFIG_FILE" | grep -q .; then
            echo "ERROR: The kubeconfig contains no clusters. Ensure the secret holds a valid kubeconfig with cluster definitions."
            exit 1
          fi

          kubectl config current-context --kubeconfig "$KUBECONFIG_FILE"
          kubectl get namespaces --kubeconfig "$KUBECONFIG_FILE"

      - name: Deploy to Kubernetes
        if: steps.kubeconfig.outputs.kubeconfig_available == 'true'
        run: |
          set -eux
          kubectl --kubeconfig ~/.kube/config apply -f k8s-deployment.yaml
          kubectl --kubeconfig ~/.kube/config rollout status deployment/dotnetproject-deployment -n dotnetproject-ns --timeout=120s
