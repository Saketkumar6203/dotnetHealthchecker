name: .NET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet/v3-cache
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish Web API artifact
        run: |
          dotnet publish Dotnetproject.csproj --configuration Release --output ./publish --no-restore
          echo "artifact_path=publish" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api-publish
          path: publish

  codeql:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

  dependency-vulnerability:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan dependencies for vulnerabilities
        run: |
          set -o pipefail
          echo "Scanning package vulnerabilities..."
          vulnerabilities=$(dotnet list package --vulnerable 2>&1 || true)
          echo "$vulnerabilities"
          if echo "$vulnerabilities" | grep -E 'Severity: (High|Critical)' >/dev/null; then
            echo "High or critical vulnerabilities found. Failing the job."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/saketkumar6203/dotnethealthchecker:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          set -eux
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" > /tmp/kubeconfig.data
          if base64 --decode /tmp/kubeconfig.data > /tmp/kubeconfig.yaml 2>/dev/null; then
            echo "KUBE_CONFIG_DATA decoded as base64"
            mv /tmp/kubeconfig.yaml ~/.kube/config
          else
            echo "KUBE_CONFIG_DATA is raw kubeconfig"
            cat /tmp/kubeconfig.data > ~/.kube/config
          fi
          echo "--- kubeconfig preview ---"
          head -n 20 ~/.kube/config
          kubectl config view --kubeconfig ~/.kube/config
          if kubectl config current-context --kubeconfig ~/.kube/config >/dev/null 2>&1; then
            echo "current-context is set"
          else
            echo "current-context is not set, selecting the first available context"
            ctx=$(kubectl config get-contexts -o name --kubeconfig ~/.kube/config | head -n 1)
            if [ -z "$ctx" ]; then
              echo "ERROR: no contexts found in kubeconfig"
              exit 1
            fi
            echo "Using context: $ctx"
            kubectl config use-context "$ctx" --kubeconfig ~/.kube/config
          fi
          kubectl config current-context --kubeconfig ~/.kube/config
          kubectl get namespaces --kubeconfig ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          set -eux
          kubectl --kubeconfig ~/.kube/config apply -f k8s-deployment.yaml
          kubectl --kubeconfig ~/.kube/config rollout status deployment/dotnetproject-deployment -n dotnetproject-ns --timeout=120s
